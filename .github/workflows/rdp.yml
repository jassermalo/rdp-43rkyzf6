name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600
    steps:

      - name: "⚡ Windows Performance Optimization"
        continue-on-error: true
        shell: pwsh
        run: |
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          powercfg /h off
          $regPath = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects'
          if (!(Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
          Set-ItemProperty -Path $regPath -Name 'VisualFXSetting' -Value 2
          bcdedit /set useplatformtick yes 2>$null
          bcdedit /set disabledynamictick yes 2>$null
          $pp = 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile'
          Set-ItemProperty -Path $pp -Name 'NetworkThrottlingIndex' -Value 0xffffffff
          Set-ItemProperty -Path $pp -Name 'SystemResponsiveness'   -Value 0
          $gp = "$pp\Tasks\Games"
          if (!(Test-Path $gp)) { New-Item -Path $gp -Force | Out-Null }
          Set-ItemProperty -Path $gp -Name 'GPU Priority' -Value 8
          Set-ItemProperty -Path $gp -Name 'Priority' -Value 6
          Set-ItemProperty -Path $gp -Name 'Scheduling Category' -Value 'High'
          Set-ItemProperty -Path $gp -Name 'SFIO Priority' -Value 'High'
          Set-ItemProperty -Path $gp -Name 'Clock Rate' -Value 10000
          Set-ItemProperty -Path $gp -Name 'Affinity' -Value 0
          Set-ItemProperty -Path $gp -Name 'Background Only' -Value 'False'
          $services = @('WSearch','SysMain','DiagTrack','dmwappushservice','MapsBroker',
                        'XboxGipSvc','XblAuthManager','XblGameSave','XboxNetApiSvc','Fax','PrintNotify')
          foreach ($svc in $services) {
            try {
              Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
              Set-Service  -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
            } catch {}
          }
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          try {
            $cs = Get-CimInstance -ClassName Win32_ComputerSystem
            Set-CimInstance -InputObject $cs -Property @{ AutomaticManagedPagefile = $false }
            $pf = Get-CimInstance -ClassName Win32_PageFileSetting -ErrorAction SilentlyContinue
            if ($pf) { Set-CimInstance -InputObject $pf -Property @{ InitialSize = 4096; MaximumSize = 8192 } }
          } catch { Write-Host "Page file tweak skipped" }
          Set-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl' -Name 'Win32PrioritySeparation' -Value 38
          Write-Host "✅ Windows optimized"

      - name: "🖥️ Configure RDP"
        shell: pwsh
        run: |
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0 -Force
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name UserAuthentication -Value 0 -Force
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name SecurityLayer -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force
          Write-Host "✅ RDP configured"

      - name: "👤 Create User Accounts via SYSTEM Task"
        shell: pwsh
        run: |
          # Write the setup script
          $script = @'
net user Administrator 12345 /active:yes 2>nul
net user RDP 12345 /add 2>nul
net localgroup Administrators "RDP" /add 2>nul
net localgroup "Remote Desktop Users" "RDP" /add 2>nul
net localgroup "Remote Desktop Users" "Administrator" /add 2>nul
'@
          $scriptPath = "$env:TEMP\setup_users.cmd"
          $script | Set-Content $scriptPath -Encoding ASCII

          # First disable password complexity via security policy
          $secCfg = @"
[Unicode]
Unicode=yes
[Version]
signature="`$CHICAGO`$"
Revision=1
[System Access]
MinimumPasswordAge = 0
MaximumPasswordAge = -1
MinimumPasswordLength = 0
PasswordComplexity = 0
PasswordHistorySize = 0
LockoutBadCount = 0
EnableAdminAccount = 1
EnableGuestAccount = 0
"@
          $cfgPath = "$env:TEMP\secpol.cfg"
          $secCfg | Set-Content -Path $cfgPath -Encoding Unicode
          secedit /configure /db "$env:TEMP\secedit.sdb" /cfg $cfgPath /areas SECURITYPOLICY /quiet 2>$null
          Write-Host "Security policy updated"

          # Run the user setup as SYSTEM via scheduled task (bypasses all password restrictions)
          $action   = New-ScheduledTaskAction  -Execute 'cmd.exe' -Argument "/c `"$scriptPath`""
          $trigger  = New-ScheduledTaskTrigger -Once -At ((Get-Date).AddSeconds(3))
          $settings = New-ScheduledTaskSettingsSet -ExecutionTimeLimit (New-TimeSpan -Minutes 2)
          $principal= New-ScheduledTaskPrincipal  -UserId 'NT AUTHORITY\SYSTEM' -RunLevel Highest

          Register-ScheduledTask -TaskName 'RDPSetup' -Action $action -Trigger $trigger `
            -Settings $settings -Principal $principal -Force | Out-Null

          Start-ScheduledTask -TaskName 'RDPSetup'
          Write-Host "Waiting for task to complete..."
          Start-Sleep -Seconds 20

          # Verify
          $rdpUser  = Get-LocalUser -Name "RDP"          -ErrorAction SilentlyContinue
          $adminOn  = (Get-LocalUser -Name "Administrator").Enabled
          Write-Host "Administrator enabled: $adminOn"
          Write-Host "RDP user exists: $($null -ne $rdpUser)"

          Unregister-ScheduledTask -TaskName 'RDPSetup' -Confirm:$false -ErrorAction SilentlyContinue
          Write-Host "✅ Users ready: RDP + Administrator  |  Password: 12345"

      - name: "🎮 Install Virtual GPU (Mesa3D OpenGL)"
        continue-on-error: true
        shell: pwsh
        run: |
          $mesa7z = "$env:TEMP\mesa3d.7z"
          Invoke-WebRequest -Uri "https://github.com/pal1000/mesa-dist-win/releases/download/24.3.4/mesa3d-24.3.4-release-mingw.7z" -OutFile $mesa7z -UseBasicParsing
          $mesaDir = "$env:TEMP\mesa3d"
          & "C:\Program Files\7-Zip\7z.exe" x $mesa7z -o"$mesaDir" -y | Out-Null
          $deploy = Get-ChildItem -Path $mesaDir -Filter "systemwidedeploy.cmd" -Recurse | Select-Object -First 1
          if ($deploy) {
            & cmd /c "`"$($deploy.FullName)`" 1"
          } else {
            Get-ChildItem -Path $mesaDir -Filter "opengl32.dll" -Recurse | ForEach-Object {
              Copy-Item $_.FullName "C:\Windows\System32\" -Force -ErrorAction SilentlyContinue
            }
          }
          Remove-Item $mesa7z -Force -ErrorAction SilentlyContinue
          Write-Host "✅ Mesa3D (Virtual GPU / OpenGL) installed"

      - name: "📦 Install Chocolatey"
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-Expression ((New-Object Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          Write-Host "✅ Chocolatey installed"

      - name: "🦁 Install Brave Browser"
        shell: pwsh
        run: |
          choco install brave -y --no-progress
          Write-Host "✅ Brave installed"

      - name: "☕ Install Java 17"
        shell: pwsh
        run: |
          choco install temurin17 -y --no-progress
          Write-Host "✅ Java 17 installed"

      - name: "⛏️ Install Minecraft Launcher (v1.0)"
        shell: pwsh
        run: |
          $dest = "$env:TEMP\MinecraftInstaller.msi"
          Invoke-WebRequest -Uri "https://launcher.mojang.com/download/MinecraftInstaller.msi" -OutFile $dest -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$dest`" /quiet /norestart" -Wait
          Remove-Item $dest -Force -ErrorAction SilentlyContinue
          $mcDir = "$env:APPDATA\.minecraft"
          if (!(Test-Path $mcDir)) { New-Item -ItemType Directory -Path $mcDir -Force | Out-Null }
          @{
            profiles = @{
              v1 = @{
                name          = "Minecraft 1.0"
                type          = "custom"
                lastVersionId = "1.0"
                javaArgs      = "-Xmx2G -Xms512m -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
              }
            }
            settings = @{ enableHistorical = $true; enableAdvanced = $true; showGameLog = $false }
            selectedUser = @{}
          } | ConvertTo-Json -Depth 10 | Set-Content "$mcDir\launcher_profiles.json" -Encoding UTF8
          Write-Host "✅ Minecraft installed (v1.0 profile configured)"

      - name: "🔗 Shortcuts and Auto-Launch"
        continue-on-error: true
        shell: pwsh
        run: |
          $shell = New-Object -ComObject WScript.Shell
          $launcher = @(
            "C:\Program Files (x86)\Minecraft Launcher\MinecraftLauncher.exe",
            "$env:LOCALAPPDATA\Programs\Minecraft Launcher\MinecraftLauncher.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (!$launcher) {
            $launcher = Get-ChildItem 'C:\Program Files*' -Filter 'MinecraftLauncher.exe' `
              -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if ($launcher) {
            $sc = $shell.CreateShortcut("C:\Users\Public\Desktop\Minecraft.lnk")
            $sc.TargetPath = $launcher; $sc.Save()
            $su = "C:\Users\RDP\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup"
            if (!(Test-Path $su)) { New-Item -ItemType Directory -Path $su -Force | Out-Null }
            $ms = $shell.CreateShortcut("$su\Minecraft.lnk")
            $ms.TargetPath = $launcher; $ms.Save()
            Write-Host "✅ Minecraft shortcut + auto-launch on login"
          }
          $brave = Get-ChildItem 'C:\Program Files*' -Filter 'brave.exe' `
            -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if ($brave) {
            $bc = $shell.CreateShortcut("C:\Users\Public\Desktop\Brave.lnk")
            $bc.TargetPath = $brave; $bc.Save()
            Write-Host "✅ Brave shortcut created"
          }

      - name: "🌐 Install Tailscale"
        shell: pwsh
        run: |
          $dest = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile $dest -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$dest`" /quiet /norestart" -Wait
          Remove-Item $dest -Force
          Write-Host "✅ Tailscale installed"

      - name: "🔒 Connect Tailscale"
        shell: pwsh
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-rdp-$env:GITHUB_RUN_ID
          $tsIP = $null; $retries = 0
          while (-not $tsIP -and $retries -lt 15) {
            Start-Sleep -Seconds 4
            $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>$null
            $retries++
          }
          if (-not $tsIP) { Write-Error "Tailscale IP not assigned"; exit 1 }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "✅ Tailscale IP: $tsIP"

      - name: "✅ Verify RDP"
        shell: pwsh
        run: |
          $r = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $r.TcpTestSucceeded) { Write-Error "RDP port 3389 not reachable!"; exit 1 }
          Write-Host "✅ RDP is accessible"

      - name: "📡 Maintain Connection"
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════╗"
          Write-Host "║        ✅ RDP READY TO USE            ║"
          Write-Host "╠══════════════════════════════════════╣"
          Write-Host "║  Address    : $env:TAILSCALE_IP"
          Write-Host "║                                      ║"
          Write-Host "║  Username 1 : RDP                    ║"
          Write-Host "║  Username 2 : Administrator          ║"
          Write-Host "║  Password   : 12345                  ║"
          Write-Host "╠══════════════════════════════════════╣"
          Write-Host "║  🦁 Brave Browser   ✅                ║"
          Write-Host "║  ⛏️  Minecraft 1.0   ✅                ║"
          Write-Host "║  🎮 Virtual GPU     ✅                ║"
          Write-Host "║  ☕ Java 17         ✅                ║"
          Write-Host "╚══════════════════════════════════════╝"
          while ($true) {
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] RDP Active"
            Start-Sleep -Seconds 300
          }
