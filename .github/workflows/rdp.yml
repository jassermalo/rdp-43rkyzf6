name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600
    steps:

      - name: Performance Optimization
        continue-on-error: true
        shell: pwsh
        run: |
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          powercfg /h off
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          $pp = 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile'
          Set-ItemProperty -Path $pp -Name 'NetworkThrottlingIndex' -Value 0xffffffff
          Set-ItemProperty -Path $pp -Name 'SystemResponsiveness' -Value 0
          $gp = "$pp\Tasks\Games"
          if (!(Test-Path $gp)) { New-Item -Path $gp -Force | Out-Null }
          Set-ItemProperty -Path $gp -Name 'GPU Priority' -Value 8
          Set-ItemProperty -Path $gp -Name 'Priority' -Value 6
          Set-ItemProperty -Path $gp -Name 'Scheduling Category' -Value 'High'
          Set-ItemProperty -Path $gp -Name 'SFIO Priority' -Value 'High'
          $services = @('WSearch','SysMain','DiagTrack','dmwappushservice','MapsBroker',
                        'XboxGipSvc','XblAuthManager','XblGameSave','XboxNetApiSvc','Fax')
          foreach ($svc in $services) {
            try {
              Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
              Set-Service  -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
            } catch {}
          }
          Set-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl' -Name 'Win32PrioritySeparation' -Value 38
          Write-Host "Windows optimized"

      - name: Set Arabic Language
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "Setting Arabic language via Registry (no download needed)..."

          # System locale + region
          Set-WinSystemLocale -SystemLocale ar-SA -ErrorAction SilentlyContinue
          Set-WinHomeLocation -GeoId 187 -ErrorAction SilentlyContinue

          # UI language override
          Set-WinUILanguageOverride -Language ar-SA -ErrorAction SilentlyContinue

          # User language list (Arabic first)
          $langList = New-WinUserLanguageList ar-SA
          $langList.Add('en-US')
          Set-WinUserLanguageList $langList -Force -ErrorAction SilentlyContinue

          # Copy to Welcome Screen + new users
          Copy-UserInternationalSettingsToSystem -WelcomeScreen $True -NewUser $True -ErrorAction SilentlyContinue

          # Registry keys for current user
          Set-ItemProperty 'HKCU:\Control Panel\International' -Name 'LocaleName' -Value 'ar-SA' -ErrorAction SilentlyContinue
          Set-ItemProperty 'HKCU:\Control Panel\International' -Name 'sLanguage'  -Value 'ARA'   -ErrorAction SilentlyContinue
          Set-ItemProperty 'HKCU:\Control Panel\International' -Name 'sCountry'   -Value 'Saudi Arabia' -ErrorAction SilentlyContinue

          # MUI preferred language
          $muiPath = 'HKLM:\SYSTEM\CurrentControlSet\Control\MUI\Settings'
          if (!(Test-Path $muiPath)) { New-Item -Path $muiPath -Force | Out-Null }
          Set-ItemProperty $muiPath -Name 'PreferredUILanguages' -Value @('ar-SA') -Type MultiString -ErrorAction SilentlyContinue

          # Apply to Default user hive (affects RDP/Administrator at login)
          reg load 'HKU\DEFAULT_USER' 'C:\Users\Default\NTUSER.DAT' 2>$null
          reg add 'HKU\DEFAULT_USER\Control Panel\International' /v LocaleName /t REG_SZ /d ar-SA /f 2>$null
          reg add 'HKU\DEFAULT_USER\Control Panel\International' /v sLanguage  /t REG_SZ /d ARA    /f 2>$null
          reg add 'HKU\DEFAULT_USER\Control Panel\International' /v sCountry   /t REG_SZ /d "Saudi Arabia" /f 2>$null
          reg unload 'HKU\DEFAULT_USER' 2>$null

          Write-Host "Arabic language configured (ar-SA) - no download required"

      - name: Configure RDP
        shell: pwsh
        run: |
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0 -Force
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name UserAuthentication -Value 0 -Force
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name SecurityLayer -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Open" 2>$null
          netsh advfirewall firewall add rule name="RDP-Open" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force
          Write-Host "RDP configured"

      - name: Create Users via SYSTEM Task
        shell: pwsh
        run: |
          $script = "net user Administrator 12345 /active:yes & net user RDP 12345 /add & net localgroup Administrators RDP /add & net localgroup ""Remote Desktop Users"" RDP /add & net localgroup ""Remote Desktop Users"" Administrator /add"
          $scriptPath = "$env:TEMP\setup_users.cmd"
          $script | Set-Content $scriptPath -Encoding ASCII
          $secCfg = "[Unicode]`r`nUnicode=yes`r`n[Version]`r`nsignature=""`$CHICAGO`$""`r`nRevision=1`r`n[System Access]`r`nMinimumPasswordAge = 0`r`nMaximumPasswordAge = -1`r`nMinimumPasswordLength = 0`r`nPasswordComplexity = 0`r`nPasswordHistorySize = 0`r`nLockoutBadCount = 0`r`nEnableAdminAccount = 1`r`nEnableGuestAccount = 0"
          $cfgPath = "$env:TEMP\secpol.cfg"
          [System.IO.File]::WriteAllText($cfgPath, $secCfg, [System.Text.Encoding]::Unicode)
          secedit /configure /db "$env:TEMP\secedit.sdb" /cfg $cfgPath /areas SECURITYPOLICY /quiet 2>$null
          $action = New-ScheduledTaskAction -Execute 'cmd.exe' -Argument "/c `"$scriptPath`""
          $trigger = New-ScheduledTaskTrigger -Once -At ((Get-Date).AddSeconds(3))
          $settings = New-ScheduledTaskSettingsSet -ExecutionTimeLimit (New-TimeSpan -Minutes 2)
          $principal = New-ScheduledTaskPrincipal -UserId 'NT AUTHORITY\SYSTEM' -RunLevel Highest
          Register-ScheduledTask -TaskName 'RDPSetup' -Action $action -Trigger $trigger -Settings $settings -Principal $principal -Force | Out-Null
          Start-ScheduledTask -TaskName 'RDPSetup'
          Start-Sleep -Seconds 20
          Unregister-ScheduledTask -TaskName 'RDPSetup' -Confirm:$false -ErrorAction SilentlyContinue
          Write-Host "Users ready - RDP + Administrator - Password: 12345"

      - name: Install Virtual GPU Mesa3D
        continue-on-error: true
        shell: pwsh
        run: |
          $mesa7z = "$env:TEMP\mesa3d.7z"
          Invoke-WebRequest -Uri "https://github.com/pal1000/mesa-dist-win/releases/download/24.3.4/mesa3d-24.3.4-release-mingw.7z" -OutFile $mesa7z -UseBasicParsing
          $mesaDir = "$env:TEMP\mesa3d"
          & "C:\Program Files\7-Zip\7z.exe" x $mesa7z -o"$mesaDir" -y | Out-Null
          $deploy = Get-ChildItem -Path $mesaDir -Filter "systemwidedeploy.cmd" -Recurse | Select-Object -First 1
          if ($deploy) { & cmd /c "`"$($deploy.FullName)`" 1" }
          Remove-Item $mesa7z -Force -ErrorAction SilentlyContinue
          Write-Host "Mesa3D Virtual GPU installed"

      - name: Install Chocolatey and Java
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-Expression ((New-Object Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          choco install temurin17 -y --no-progress
          Write-Host "Chocolatey + Java 17 installed"

      - name: Download YouTube Video to Desktop
        continue-on-error: true
        shell: pwsh
        run: |
          pip install yt-dlp -q
          $url = "https://www.youtube.com/live/asgUydJW1Rg?si=IHESYTCIRwdneJkJ"
          $desktops = @(
            "C:\Users\Public\Desktop",
            "C:\Users\RDP\Desktop",
            "C:\Users\Administrator\Desktop"
          )
          foreach ($d in $desktops) {
            if (!(Test-Path $d)) { New-Item -ItemType Directory -Path $d -Force | Out-Null }
            Write-Host "Downloading to $d ..."
            yt-dlp $url -o "$d\video.%(ext)s" --no-playlist --progress
          }
          Write-Host "YouTube video downloaded to Desktop"
      - name: Install OBS Virtual Camera
        continue-on-error: true
        shell: pwsh
        run: |
          choco install obs-studio -y --no-progress
          Start-Sleep -Seconds 20

          # Find downloaded video
          $videoPath = "C:\Users\Public\Desktop\video.mp4"
          foreach ($d in @("C:\Users\Public\Desktop","C:\Users\RDP\Desktop","C:\Users\Administrator\Desktop")) {
            $f = Get-ChildItem -Path $d -Filter "video.*" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($f) { $videoPath = $f.FullName; break }
          }
          Write-Host "Using video: $videoPath"

          # Build OBS scene collection JSON
          $sceneJson = @"
{
  "current_program_scene": "VirtualCam",
  "current_preview_scene": "VirtualCam",
  "current_scene": "VirtualCam",
  "name": "VirtualCam",
  "scene_order": [{"name": "VirtualCam"}],
  "sources": [
    {
      "id": "scene", "versioned_id": "scene",
      "name": "VirtualCam", "enabled": true, "volume": 1.0, "muted": false,
      "flags": 0, "mixers": 0, "sync": 0, "monitoring_type": 0,
      "private_settings": {}, "push-to-mute-delay": 0, "push-to-talk-delay": 0, "hotkeys": {},
      "settings": {
        "id_counter": 1,
        "items": [{"name":"YouTube Video","id":1,"visible":true,"locked":false,"rot":0.0,
          "pos":{"x":0.0,"y":0.0},"scale":{"x":1.0,"y":1.0},"align":5,"bounds_type":0,
          "bounds_align":0,"bounds":{"x":0.0,"y":0.0},"crop_top":0,"crop_bottom":0,
          "crop_left":0,"crop_right":0,"group_item_backup":false,"hide_when_not_playing":false,
          "private_settings":{}}]
      }
    },
    {
      "id": "ffmpeg_source", "versioned_id": "ffmpeg_source",
      "name": "YouTube Video", "enabled": true, "volume": 1.0, "muted": false,
      "flags": 0, "mixers": 255, "sync": 0, "monitoring_type": 0,
      "private_settings": {}, "push-to-mute-delay": 0, "push-to-talk-delay": 0, "hotkeys": {},
      "settings": {
        "is_local_file": true,
        "local_file": "$($videoPath -replace '\\','\\\\' )",
        "looping": true,
        "speed_percent": 100,
        "hw_decode": false
      }
    }
  ],
  "transition_duration": 300,
  "transitions": []
}
"@

          $obsSceneDir = "$env:APPDATA\obs-studio\basic\scenes"
          New-Item -ItemType Directory -Path $obsSceneDir -Force | Out-Null
          $sceneJson | Set-Content "$obsSceneDir\VirtualCam.json" -Encoding UTF8

          # Launch OBS minimized (will appear in RDP taskbar)
          $obsExe = "C:\Program Files\obs-studio\bin\64bit\obs64.exe"
          if (Test-Path $obsExe) {
            Start-Process -FilePath $obsExe `
              -ArgumentList "--minimize-to-tray --scene VirtualCam --collection VirtualCam --startreplaybuffer" `
              -WindowStyle Minimized
            Start-Sleep -Seconds 15

            # Auto-start virtual camera via OBS WebSocket (built-in, port 4455)
            Add-Type -AssemblyName System.Net.WebSockets, System.Threading
            $ws = [System.Net.WebSockets.ClientWebSocket]::new()
            $cts = [System.Threading.CancellationTokenSource]::new()
            try {
              $ws.ConnectAsync([Uri]"ws://localhost:4455", $cts.Token).Wait(5000) | Out-Null
              $enc = [System.Text.Encoding]::UTF8
              $recv = [byte[]]::new(4096)
              $ws.ReceiveAsync([ArraySegment[byte]]$recv, $cts.Token).Wait(3000) | Out-Null
              $identify = $enc.GetBytes('{"op":1,"d":{"rpcVersion":1}}')
              $ws.SendAsync([ArraySegment[byte]]$identify,[System.Net.WebSockets.WebSocketMessageType]::Text,$true,$cts.Token).Wait(3000) | Out-Null
              Start-Sleep -Seconds 2
              $ws.ReceiveAsync([ArraySegment[byte]]$recv, $cts.Token).Wait(3000) | Out-Null
              $startVcam = $enc.GetBytes('{"op":6,"d":{"requestType":"StartVirtualCam","requestId":"1","requestData":{}}}')
              $ws.SendAsync([ArraySegment[byte]]$startVcam,[System.Net.WebSockets.WebSocketMessageType]::Text,$true,$cts.Token).Wait(3000) | Out-Null
              Write-Host "Virtual camera started automatically via OBS WebSocket"
            } catch {
              Write-Host "OBS WebSocket auto-start failed (normal) - open OBS from taskbar and click Start Virtual Camera"
            } finally {
              $ws.Dispose()
            }
          } else {
            Write-Host "OBS not found at expected path"
          }
          Write-Host "==============================="
          Write-Host "VIRTUAL CAMERA READY"
          Write-Host "==============================="
          Write-Host "Camera name: OBS Virtual Camera"
          Write-Host "Any app (Zoom/Teams/WhatsApp) will see the YouTube video"
          Write-Host "If camera not active: open OBS from taskbar > click Start Virtual Camera"
          Write-Host "==============================="
      - name: Connect via bore.pub
        shell: pwsh
        run: |
          $releases = Invoke-RestMethod "https://api.github.com/repos/ekzhang/bore/releases/latest"
          $asset = $releases.assets | Where-Object { $_.name -match "windows" } | Select-Object -First 1
          $boreExe = "$env:TEMP\bore.exe"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $boreExe -UseBasicParsing

          $logOut = "$env:TEMP\bore_out.txt"
          "" | Set-Content $logOut

          Start-Process -FilePath $boreExe `
            -ArgumentList "local 3389 --to bore.pub" `
            -RedirectStandardOutput $logOut `
            -NoNewWindow -PassThru | Out-Null

          Start-Sleep -Seconds 10

          $output = Get-Content $logOut -Raw -ErrorAction SilentlyContinue
          $match = [regex]::Match($output, 'bore\.pub:(\d+)')

          Write-Host ""
          Write-Host "==============================="
          Write-Host "       RDP READY TO USE"
          Write-Host "==============================="
          if ($match.Success) {
            Write-Host "Address  : bore.pub:$($match.Groups[1].Value)"
          } else {
            Write-Host "Address  : bore.pub (see logs for port)"
            Write-Host "Raw output: $output"
          }
          Write-Host "Username : RDP   (or Administrator)"
          Write-Host "Password : 12345"
          Write-Host "==============================="
          Write-Host "Virtual GPU     : Installed"
          Write-Host "Java 17         : Installed"
          Write-Host "Arabic Language : Configured (ar-SA)"
          Write-Host "YouTube Video   : Downloaded to Desktop"
          Write-Host "==============================="

          while ($true) {
            $out = Get-Content $logOut -Raw -ErrorAction SilentlyContinue
            $m = [regex]::Match($out, 'bore\.pub:(\d+)')
            if ($m.Success) {
              Write-Host "[$((Get-Date).ToString('HH:mm:ss'))] RDP Active - bore.pub:$($m.Groups[1].Value)"
            } else {
              Write-Host "[$((Get-Date).ToString('HH:mm:ss'))] RDP Active via bore.pub"
            }
            Start-Sleep -Seconds 60
          }
